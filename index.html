<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titan AI - Advanced Intelligence Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 900px;
            margin: 0 auto;
            background: linear-gradient(135deg, #0f1629 0%, #1a1f3a 50%, #0f1629 100%);
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, rgba(15, 22, 41, 0.95) 0%, rgba(26, 31, 58, 0.95) 100%);
            border-bottom: 2px solid #d4af37;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .header h1 {
            font-size: 28px;
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .header p {
            font-size: 12px;
            color: #999;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Chat area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .chat-container::-webkit-scrollbar {
            width: 8px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: rgba(212, 175, 55, 0.1);
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: #d4af37;
            border-radius: 4px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.5;
            font-size: 14px;
        }

        .user .message-content {
            background: linear-gradient(135deg, #d4af37 0%, #f0e68c 100%);
            color: #0f1629;
            font-weight: 500;
        }

        .titan .message-content {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid #d4af37;
            color: #e0e0e0;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .user .message-avatar {
            background: #d4af37;
            color: #0f1629;
            order: 2;
        }

        .titan .message-avatar {
            background: linear-gradient(135deg, #d4af37 0%, #f0e68c 100%);
            color: #0f1629;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #d4af37;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.3;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-10px);
            }
        }

        /* Input area */
        .input-area {
            background: linear-gradient(135deg, rgba(15, 22, 41, 0.95) 0%, rgba(26, 31, 58, 0.95) 100%);
            border-top: 2px solid #d4af37;
            padding: 16px 20px;
            display: flex;
            gap: 10px;
        }

        .input-field {
            flex: 1;
            background: rgba(224, 224, 224, 0.05);
            border: 1px solid #d4af37;
            border-radius: 8px;
            padding: 12px 16px;
            color: #e0e0e0;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            background: rgba(212, 175, 55, 0.1);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            border-color: #f0e68c;
        }

        .input-field::placeholder {
            color: #666;
        }

        .send-button {
            background: linear-gradient(135deg, #d4af37 0%, #f0e68c 100%);
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            color: #0f1629;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .send-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.4);
        }

        .send-button:active {
            transform: translateY(0);
        }

        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Initial message */
        .welcome-message {
            text-align: center;
            color: #d4af37;
            font-size: 18px;
            margin-top: auto;
            margin-bottom: auto;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        @media (max-width: 768px) {
            .message-content {
                max-width: 85%;
            }
            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ TITAN AI ⚡</h1>
            <p>Advanced Intelligence Platform v1.0</p>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="message titan">
                <div class="message-avatar">T</div>
                <div class="message-content">
                    What are we working on today?
                </div>
            </div>
        </div>

        <div class="input-area">
            <input 
                type="text" 
                class="input-field" 
                id="messageInput" 
                placeholder="Ask me anything..."
                autocomplete="off"
            >
            <button class="send-button" id="sendButton">Send</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');

        // Send message on button click or Enter key
        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            // Add user message to chat
            addMessage(message, 'user');
            messageInput.value = '';
            sendButton.disabled = true;

            // Show typing indicator
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message titan';
            typingDiv.innerHTML = '<div class="message-avatar">T</div><div class="message-content"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>';
            chatContainer.appendChild(typingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                // Call the backend API
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                const data = await response.json();
                
                // Remove typing indicator
                typingDiv.remove();

                if (data.error) {
                    addMessage('I encountered an issue processing your request. Please try again.', 'titan');
                } else {
                    addMessage(data.response, 'titan');
                }
            } catch (error) {
                typingDiv.remove();
                addMessage('Connection error. Please ensure the backend is running.', 'titan');
            }

            sendButton.disabled = false;
            messageInput.focus();
        }

        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const avatar = sender === 'user' ? 'You' : 'T';
            messageDiv.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-content">${escapeHtml(text)}</div>
            `;
            
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
